version: "3"

services:

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8080:80"

  backend:
    build: ./backend
    restart: always
    ports:
      - "4000:4000"

  database:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  prometheus:
    image: prom/prometheus
    restart: always
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
