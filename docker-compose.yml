version: "3"

services:

  app:
    image: node:18-alpine
    command: sh -c "npx http-server -p 3000"
    ports:
      - "3000:3000"

  nginx:
    image: nginx
    ports:
      - "8080:80"

  database:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
